<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-COMPATIBLE" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}E2 Spy{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@{{ g.versions.bs }}/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@{{ g.versions.bi }}/font/bootstrap-icons.min.css"
          rel="stylesheet">
    {% block end_of_head %}{% endblock %}
</head>
<body>
<div class="container-fluid">
    <div class="pt-3 row justify-content-between">
        <div class="col-auto">
            {% block breadcrumb %}
                <a class="btn btn-outline-dark" href="#">
                    <strong>
                        <i class="bi-house-fill"></i>
                        E2 Spy
                    </strong>
                </a>
            {% endblock %}
        </div>
        <div class="col-auto">
            {% if g.unlocked %}
                <form action="{{ url_for('lock') }}" class="d-inline" method="post">
                    <input name="endpoint" type="hidden" value="{{ request.endpoint }}">
                    <button class="btn btn-outline-dark" title="Lock this page" type="submit">
                        <i class="bi-unlock"></i>
                    </button>
                </form>
            {% endif %}
            <a class="btn btn-outline-dark" href="{{ url_for('settings') }}" title="Settings">
                <i class="bi-gear"></i>
            </a>
        </div>
    </div>

    {% block content %}{% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@{{ g.versions.bs }}/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/htmx.org@{{ g.versions.hx }}/dist/htmx.js"></script>
{% block end_of_body %}{% endblock %}
</body>
</html>
